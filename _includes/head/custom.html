<!-- Custom styles for homepage -->
<style>
/* Base font — scale up on larger screens for readability */
html { font-size: 14px; }
@media (min-width: 900px)  { html { font-size: 15px; } }
@media (min-width: 1400px) { html { font-size: 15.5px; } }
@media (min-width: 1800px) { html { font-size: 16px; } }

/* Mobile: keep content snug to the edges so text doesn't feel cramped */
@media (max-width: 768px) {
  .page {
    padding-left: 1em !important;
    padding-right: 1em !important;
  }
}

/* Desktop / large monitors: widen content and reclaim the unused right-sidebar space */
@media (min-width: 1024px) {
  .page {
    width: auto !important;
    float: none !important;
    margin-left: auto !important;
    margin-right: auto !important;
    padding-left: 2em !important;
    padding-right: 2em !important;
    max-width: 1240px !important;
  }
}
@media (min-width: 1400px) {
  .page { max-width: 1440px !important; }
}
@media (min-width: 1800px) {
  .page { max-width: 1600px !important; }
}

/* Comfortable line length and spacing */
.page__content { line-height: 1.65; }
.page__content p { margin-bottom: 0.9em; }
.page__content h2 { margin-top: 1.5em; margin-bottom: 0.5em; }
.page__content h3 { margin-top: 1.1em; margin-bottom: 0.4em; }

/* Profile header */
.profile-header { display: flex; gap: 30px; align-items: flex-start; margin-bottom: 20px; }
.profile-photo { flex-shrink: 0; }
.profile-photo img { width: 180px; border-radius: 12px; }
.profile-text { flex: 1; min-width: 0; }
.profile-text h1 { margin-top: 0; margin-bottom: 8px; font-size: 1.8em; }
.profile-links { margin-top: 10px; }
.profile-links a { margin-right: 12px; text-decoration: none; }
@media (max-width: 600px) {
  .profile-header { flex-direction: column; align-items: center; text-align: center; gap: 16px; }
  .profile-photo img { width: 150px; }
  .profile-text h1 { font-size: 1.6em; }
}

/* Venue tags */
.venue { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; white-space: nowrap; }
.venue-pub { background: #d4edda; color: #155724; }
.venue-oral { background: #fff3cd; color: #856404; }
.venue-review { background: #cce5ff; color: #004085; }

/* Resource links after papers */
.pub-links a { margin-right: 6px; text-decoration: none; font-size: 0.92em; }

/* News list — scrollable timeline */
.news-list {
  list-style: none;
  padding: 4px 12px 4px 16px;
  margin: 0;
  max-height: 320px;
  overflow-y: auto;
  border-left: 2px solid #eaecef;
  scrollbar-width: thin;
  scrollbar-color: #c1c8d0 transparent;
}
.news-list li { margin-bottom: 10px; padding-left: 0; line-height: 1.65; }
.news-date { font-weight: 700; color: #494e52; margin-right: 4px; }
/* Webkit scrollbar styling */
.news-list::-webkit-scrollbar { width: 6px; }
.news-list::-webkit-scrollbar-track { background: transparent; }
.news-list::-webkit-scrollbar-thumb { background: #c1c8d0; border-radius: 3px; }
.news-list::-webkit-scrollbar-thumb:hover { background: #a0a8b0; }

/* Education & Internship rows */
.edu-row { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
.edu-row img { flex-shrink: 0; }
.edu-info { line-height: 1.5; flex: 1; min-width: 200px; }

/* Prevent overflow on small screens */
.page__content img { max-width: 100%; height: auto; }

/* Inline logos in text (e.g., institution icons in intro) */
.page__content img.inline-logo,
img.inline-logo {
  display: inline-block !important;
  height: 1.2em !important;
  width: auto !important;
  max-width: none !important;
  vertical-align: -0.2em;
  margin: 0 2px;
}
</style>
